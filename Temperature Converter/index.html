<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1> Temperature Converter</h1>
<input
type="number"
id="temperature"
placeholder="Enter Temperature"
oninput="convertTemperature()"
>
<select id="scale" onchange="convertTemperature()">
<option value="celsius">Celsius</option>
<option value="fahrenheit">Fahrenheit</option>
<option value="kelvin">Kelvin</option>
</select>
<div class="button-group">
<button onclick="convertTemperature()">
 Convert
</button>
<button onclick="resetFields()" class="reset-btn">
 Reset
</button>
<button onclick="toggleDarkMode()" class="dark-btn">
 Dark Mode
</button>
</div>
<div class="result" id="result">
<div class="card">
<h3> Celsius</h3>
<p id="celsiusResult">0 °C</p>
</div>
<div class="card">
<h3> Fahrenheit</h3>
<p id="fahrenheitResult">32 °F</p>
</div>
<div class="card">
<h3> Kelvin</h3>
<p id="kelvinResult">273.15 K</p>
</div>
</div>
</div>
<footer>
 Developed by Abhishek Badiger
</footer>
<script src="script.js"></script>
</body>
</html>
